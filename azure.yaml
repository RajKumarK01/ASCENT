# azd configuration for ASCENT.
#
# ASCENT deploys as a Foundry **Hosted Agent** (kind: hosted), NOT a Container App.
# The deploy flow is:
#   1. az acr build --registry <acr> --image ascent:hosted-vN --platform linux/amd64 .
#   2. py scripts/deploy_hosted_agent.py     # registers ascent-orchestrator in Foundry
#   3. py scripts/invoke_hosted_agent.py     # verify
#
# `azd provision` (optional) creates the supporting ACR + Application Insights via
# infra/main.bicep. The agent image and the agent registration are handled by the
# scripts above, not by `azd deploy`.
name: ascent
metadata:
  template: ascent-foundry-hosted-agent

infra:
  path: ./infra
