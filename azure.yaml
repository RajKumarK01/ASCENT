# azd configuration for deploying ASCENT as a Foundry Hosted Agent.
# Run: azd provision  (creates Foundry project, model, App Insights, ACR)
#      azd deploy     (builds container, pushes to ACR, publishes hosted agent)
name: ascent
metadata:
  template: ascent-foundry-hosted-agent

services:
  ascent-agent:
    project: .
    language: python
    host: containerapp        # portable; Hosted Agent flow uses `azd ai agent` extension
    docker:
      path: ./Dockerfile
      platform: linux/amd64

# NOTE: For the Foundry Hosted Agent path, also install the azd AI agent extension:
#   azd ext install azure.ai.agents
# then use `azd ai agent init/show/invoke/monitor`. See BUILD_STEPS/08.
