# azd configuration for ASCENT deployed to Azure Container Apps (Foundry-compatible).
# Run: azd provision  — creates all Azure resources via infra/main.bicep
#      azd deploy     — builds linux/amd64 image, pushes to ACR, updates container app
#
# Optional Foundry Hosted Agent path (after deploy):
#   azd ext install azure.ai.agents
#   azd ai agent show
#   azd ai agent invoke "Help L-1001 prepare for AZ-204"
#   azd ai agent monitor --follow
name: ascent
metadata:
  template: ascent-foundry-hosted-agent

infra:
  path: ./infra

services:
  ascent-agent:
    project: .
    language: python
    host: containerapp
    docker:
      path: ./Dockerfile
      platform: linux/amd64
