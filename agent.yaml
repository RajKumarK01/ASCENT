# Foundry Hosted Agent manifest — used by `azd ai agent` extension.
# Azure resources are provisioned by infra/main.bicep via `azd provision`.
# After deploy: azd ai agent show  (verify status = Active)
name: ascent-agent
description: ASCENT multi-agent enterprise learning system (synthetic demo data only).

container_protocol_versions:
  - responses

resources:
  cpu: "0.5"
  memory: "1Gi"

environment_variables:
  - name: ASCENT_MODE
    value: foundry
  - name: AZURE_AI_MODEL_DEPLOYMENT
    value: gpt-4o
  - name: AZURE_SEARCH_KNOWLEDGE_BASE
    value: ascent-kb
  # Foundry runtime auto-injects at startup:
  # APPLICATIONINSIGHTS_CONNECTION_STRING
  # AZURE_AI_PROJECT_ENDPOINT
  # Use connection references for secrets (set up connections in the hub first):
  - name: AZURE_SEARCH_ENDPOINT
    value: ${{connections.search-connection.target}}
  - name: AZURE_OPENAI_ENDPOINT
    value: ${{connections.aoai-connection.target}}
